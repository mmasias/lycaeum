# debate.conf — Configuración de instancia

# Dominio (debe existir en config/dominios/)
DOMINIO=poesia

# Agentes: nombre_sesion:cli:marco (el marco debe existir en config/dominios/$DOMINIO/)
# Formato: AGENTES=("nombre:cli:marco" ...)
AGENTES=(
    "formalista:opencode:formalismo"
    "fenomenologo:gemini:fenomenologia"
    "deconstructivista:qwen:deconstruccion"
)

# Moderador
MODERADOR_CLI=claude
MODERADOR_SESION=lycaeum_moderador

# Rondas
RONDAS=5

# Segundos de espera entre envíos (respeta rate limits)
INTERVALO=3

# Directorio del objeto de análisis (relativo al repo)
OBJETO_DIR=objeto

# Nota: el moderador recibe config/protocolo/moderador-base.md + config/dominios/$DOMINIO/moderador.md
# Cada agente recibe config/protocolo/agente-base.md + config/dominios/$DOMINIO/$marco.md
